<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Hotstuff CLI</title>
  <desc id="desc">Animated banner for Hotstuff CLI</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#061b2b">
        <animate attributeName="stop-color" values="#061b2b;#0d2f45;#061b2b" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#0b3d5d">
        <animate attributeName="stop-color" values="#0b3d5d;#125b83;#0b3d5d" dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="#22d3ee" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.1"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-600 0" to="600 0" dur="3.6s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="#22d3ee" stroke-opacity="0.12" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)"/>
  <rect width="1200" height="320" fill="url(#grid)">
    <animateTransform attributeName="transform" type="translate" values="0 0;36 0;0 0" dur="7s" repeatCount="indefinite"/>
  </rect>

  <circle cx="200" cy="70" r="50" fill="#22d3ee" opacity="0.2" filter="url(#glow)">
    <animate attributeName="cy" values="70;95;70" dur="5.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1010" cy="260" r="70" fill="#14b8a6" opacity="0.18" filter="url(#glow)">
    <animate attributeName="cy" values="260;230;260" dur="6.4s" repeatCount="indefinite"/>
  </circle>

  <path d="M0 210C170 180 320 260 520 230C760 190 900 260 1200 200V320H0Z" fill="#04111c" opacity="0.55"/>

  <rect x="88" y="84" width="1024" height="2" fill="url(#line)" opacity="0.85"/>

  <text x="90" y="150" fill="#e0f2fe" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="54" font-weight="700" letter-spacing="2">
    HOTSTUFF CLI
  </text>
  <text x="92" y="192" fill="#93c5fd" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="22" font-weight="500">
    SDK-powered market data and trading commands for Hotstuff
  </text>
  <text x="92" y="232" fill="#67e8f9" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace" font-size="18">
    hotstuff auth setup  |  hotstuff trade buy BTC 0.01 70000  |  hotstuff market price BTC
  </text>
</svg>
