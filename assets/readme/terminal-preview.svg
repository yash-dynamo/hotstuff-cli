<svg width="1200" height="500" viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Hotstuff CLI Terminal Preview</title>
  <desc id="desc">Animated terminal-style preview of common Hotstuff CLI commands</desc>
  <defs>
    <linearGradient id="surface" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#101827"/>
      <stop offset="100%" stop-color="#17243a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1200" height="500" rx="24" fill="#0b1220"/>
  <g filter="url(#shadow)">
    <rect x="50" y="38" width="1100" height="424" rx="16" fill="url(#surface)"/>
  </g>

  <rect x="50" y="38" width="1100" height="54" rx="16" fill="#1f2a44"/>
  <circle cx="86" cy="65" r="7" fill="#ef4444"/>
  <circle cx="110" cy="65" r="7" fill="#f59e0b"/>
  <circle cx="134" cy="65" r="7" fill="#22c55e"/>
  <text x="164" y="71" fill="#dbeafe" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace" font-size="18">
    hotstuff terminal
  </text>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace" font-size="22">
    <text x="86" y="142" fill="#22d3ee">$ hotstuff auth setup</text>
    <text x="86" y="177" fill="#a5b4fc" opacity="0">Credentials Saved: 0x12ab...90ef
      <animate attributeName="opacity" from="0" to="1" begin="0.8s" dur="0.2s" fill="freeze"/>
    </text>

    <text x="86" y="228" fill="#22d3ee" opacity="0">$ hotstuff market price BTC
      <animate attributeName="opacity" from="0" to="1" begin="1.5s" dur="0.2s" fill="freeze"/>
    </text>
    <text x="86" y="263" fill="#86efac" opacity="0">Mark: 70321.4   Bid: 70320.9   Ask: 70322.1
      <animate attributeName="opacity" from="0" to="1" begin="2.2s" dur="0.2s" fill="freeze"/>
    </text>

    <text x="86" y="314" fill="#22d3ee" opacity="0">$ hotstuff trade buy BTC 0.01 70000
      <animate attributeName="opacity" from="0" to="1" begin="2.9s" dur="0.2s" fill="freeze"/>
    </text>
    <text x="86" y="349" fill="#facc15" opacity="0">Order placed: cloid=cli-1712345678901
      <animate attributeName="opacity" from="0" to="1" begin="3.6s" dur="0.2s" fill="freeze"/>
    </text>

    <text x="86" y="400" fill="#22d3ee" opacity="0">$ hotstuff trade orders --limit 5
      <animate attributeName="opacity" from="0" to="1" begin="4.3s" dur="0.2s" fill="freeze"/>
    </text>
    <text x="86" y="435" fill="#d1fae5" opacity="0">Showing 5 open orders for 0x12ab...90ef
      <animate attributeName="opacity" from="0" to="1" begin="5.0s" dur="0.2s" fill="freeze"/>
    </text>
  </g>

  <rect x="641" y="417" width="12" height="24" fill="#67e8f9">
    <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/>
  </rect>
</svg>
